name: CI — Migrate & Deploy

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  install:
    name: Install & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint || true
      - name: Build (check)
        run: npm run build || true

  migrate:
    name: Apply database migrations
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - name: Install postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply SQL migrations
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "${SUPABASE_DB_URL}" ]; then
            echo "SUPABASE_DB_URL not set; skipping migrations"
            exit 0
          fi
          for f in supabase/migrations/*.sql; do
            echo "Applying $f"
            psql "$SUPABASE_DB_URL" -f "$f"
          done

  deploy:
    name: Deploy (optional)
    runs-on: ubuntu-latest
    needs: migrate
    if: ${{ secrets.WRANGLER_API_TOKEN && secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Deploy with Wrangler
        env:
          WRANGLER_API_TOKEN: ${{ secrets.WRANGLER_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config dist/server/wrangler.json || npx wrangler publish --account-id $CLOUDFLARE_ACCOUNT_ID
