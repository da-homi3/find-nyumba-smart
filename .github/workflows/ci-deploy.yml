name: CI — Test, Migrate & Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}

jobs:
  quality:
    name: Lint, unit tests & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test:unit
      - run: npm run build

  smoke:
    name: Route audit & smoke (production)
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Route audit
        env:
          PUBLIC_APP_URL: ${{ secrets.PUBLIC_APP_URL || 'https://nyumba-search.kevinbuluma1.workers.dev' }}
        run: npm run test:routes || true
      - name: Upload route report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: route-report
          path: route-report.json
      - name: Smoke test
        env:
          PUBLIC_APP_URL: ${{ secrets.PUBLIC_APP_URL || 'https://nyumba-search.kevinbuluma1.workers.dev' }}
        run: npm run test:smoke

  migrate:
    name: Apply database migrations
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply SQL migrations
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "${SUPABASE_DB_URL}" ]; then
            echo "SUPABASE_DB_URL not set; skipping migrations"
            exit 0
          fi
          for f in supabase/migrations/*.sql; do
            echo "Applying $f"
            psql "$SUPABASE_DB_URL" -f "$f"
          done

  deploy:
    name: Deploy (optional)
    runs-on: ubuntu-latest
    needs: [smoke, migrate]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Deploy with Wrangler
        env:
          WRANGLER_API_TOKEN: ${{ secrets.WRANGLER_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config dist/server/wrangler.json
