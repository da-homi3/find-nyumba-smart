<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NyumbaSearch — Full App Walkthrough</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #0a0a0a;
        color: #fff;
        font-family: system-ui, sans-serif;
        overflow: hidden;
      }
      #stage {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: grid;
        place-items: center;
      }
      img {
        max-width: 100vw;
        max-height: 82vh;
        object-fit: contain;
        border-radius: 8px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      }
      #bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 16px 24px;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.85));
      }
      #caption {
        font-size: 1.25rem;
        font-weight: 600;
      }
      #progress {
        margin-top: 8px;
        height: 4px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 2px;
        overflow: hidden;
      }
      #progress > div {
        height: 100%;
        background: #22c55e;
        width: 0%;
        transition: width 0.2s;
      }
      #meta {
        font-size: 0.85rem;
        opacity: 0.7;
        margin-top: 6px;
      }
      #logo {
        position: fixed;
        top: 20px;
        left: 24px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
    </style>
  </head>
  <body>
    <div id="logo">NyumbaSearch · Product Walkthrough</div>
    <div id="stage"><img id="shot" alt="" /></div>
    <div id="bar">
      <div id="caption"></div>
      <div id="progress"><div id="fill"></div></div>
      <div id="meta">Press Space to pause · Arrow keys to step · F for fullscreen</div>
    </div>
    <script>
      const slides = [
        {
          file: "screenshots/01-landing.png",
          caption: "Landing — verified Nairobi rentals",
          dur: 5000,
        },
        { file: "screenshots/02-tenant-search.png", caption: "Tenant search & filters", dur: 5000 },
        { file: "screenshots/03-map.png", caption: "Map-first discovery", dur: 4000 },
        { file: "screenshots/04-pricing.png", caption: "Landlord pricing plans", dur: 4000 },
        { file: "screenshots/05-about.png", caption: "About NyumbaSearch", dur: 4000 },
        { file: "screenshots/06-contact.png", caption: "Contact & support", dur: 4000 },
        { file: "screenshots/07-auth.png", caption: "Sign in / sign up", dur: 4000 },
        { file: "screenshots/08-landlord.png", caption: "Landlord portal", dur: 4000 },
        { file: "screenshots/09-agency.png", caption: "Agency portal", dur: 4000 },
        { file: "screenshots/10-caretaker.png", caption: "Caretaker PIN access", dur: 4000 },
        { file: "screenshots/11-settings.png", caption: "Settings hub", dur: 4000 },
        { file: "screenshots/12-manager.png", caption: "Property manager portal", dur: 4000 },
        {
          file: "screenshots/13-property-detail.png",
          caption: "Property detail — book viewing, AI chat",
          dur: 4000,
        },
        {
          file: "screenshots/14-property-detail-scroll.png",
          caption: "Listing intelligence & reviews",
          dur: 4000,
        },
      ];
      let i = 0,
        paused = false,
        timer;
      const img = document.getElementById("shot");
      const cap = document.getElementById("caption");
      const fill = document.getElementById("fill");
      function show(n) {
        i = (n + slides.length) % slides.length;
        const s = slides[i];
        img.src = s.file;
        cap.textContent = s.caption;
        fill.style.width = ((i + 1) / slides.length) * 100 + "%";
        clearTimeout(timer);
        if (!paused) timer = setTimeout(() => show(i + 1), s.dur);
      }
      document.addEventListener("keydown", (e) => {
        if (e.key === " ") {
          e.preventDefault();
          paused = !paused;
          if (!paused) show(i);
          else clearTimeout(timer);
        }
        if (e.key === "ArrowRight") {
          clearTimeout(timer);
          show(i + 1);
        }
        if (e.key === "ArrowLeft") {
          clearTimeout(timer);
          show(i - 1);
        }
        if (e.key === "f" || e.key === "F") document.documentElement.requestFullscreen?.();
      });
      show(0);
    </script>
  </body>
</html>
